name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Compile ContactManager
        run: |
          mkdir -p data
          gcc -Iinclude src/main.c src/contact.c src/storage.c -o contactmanager

      - name: Run static compilation checks
        run: |
          gcc -Iinclude -Wall -Wextra -Werror -c src/main.c src/contact.c src/storage.c

  release:
    name: Release artifact
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Compile artifact
        run: |
          mkdir -p data
          gcc -Iinclude src/main.c src/contact.c src/storage.c -o contactmanager

      - name: Create GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: "Build artifact for ${{ github.ref_name }}"
          files: contactmanager
